# defaults file for system_manager

---
system_packages:
  - git
  - curl
  - vim
  - nginx

system_service:
  - name: nginx
    state: started
    enabled: true

system_users: 
  - name: ansible_admin
    group: sudo
    shell: /bin/bash

system_folders:
  - path: "/var/www/html"
    owner: "www-data"
    group: "www-data"
    mode: "0755"

system_repos:
  - repo: "https://github.com/ansible/ansible.git"
    dest: "/opt/ansible_source"
    version: "devel"