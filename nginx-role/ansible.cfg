[defaults]
inventory          = inventories/aws_ec2.yml
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
gathering          = smart
deprecation_warnings = False
inject_facts_as_vars = False
 
[privilege_escalation]
become       = True
become_method = sudo
become_user  = root
