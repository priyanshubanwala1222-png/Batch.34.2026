---
# ubuntu.yml
# ─── Ubuntu: install specific nginx version ───────────────────────────────────

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install prerequisite packages (Ubuntu)
  apt:
    name:
      - curl
      - gnupg2
      - ca-certificates
      - lsb-release
      - ubuntu-keyring
    state: present

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download nginx signing key (modern method)
  get_url:
    url: https://nginx.org/keys/nginx_signing.key
    dest: /etc/apt/keyrings/nginx.asc
    mode: "0644"

- name: Add official nginx stable repo (Ubuntu)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nginx.asc] http://nginx.org/packages/ubuntu jammy nginx"
    state: present
    filename: nginx
    update_cache: true

- name: Install pinned nginx version (Ubuntu)
  apt:
    name: "nginx=1.24.0-1~jammy"
    state: present
    update_cache: true

- name: Hold nginx package at installed version (Ubuntu)
  dpkg_selections:
    name: nginx
    selection: hold          # prevents unintended upgrades via apt upgrade