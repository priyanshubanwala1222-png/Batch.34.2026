---
# tasks file for nginx

# ─── Detect OS and include the right tasks ────────────────────────────────────
- name: Include Ubuntu tasks
  include_tasks: ubuntu.yml
  when: ansible_facts['distribution'] == "Ubuntu"

# - name: Include RHEL tasks
#   include_tasks: rhel.yml
#   when: ansible_facts['distribution'] in ["RedHat", "CentOS", "Rocky", "AlmaLinux"]

# ─── Deploy nginx main config ─────────────────────────────────────────────────
- name: Deploy nginx main config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

# MOVED HERE: This creates the directories BEFORE the files or symlinks are handled
- name: Ensure Ubuntu virtual host directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
  when: ansible_facts['distribution'] == "Ubuntu"

# ─── Deploy virtual host / server block ──────────────────────────────────────
- name: Deploy server block config (Ubuntu)
  template:
    src: vhost.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts['distribution'] == "Ubuntu"
  notify: Restart nginx

- name: Enable site symlink (Ubuntu)
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  when: ansible_facts['distribution'] == "Ubuntu"
  notify: Restart nginx

# - name: Deploy server block config (RHEL)
#   template:
#     src: vhost.conf.j2
#     dest: /etc/nginx/conf.d/vhost.conf
#     owner: root
#     group: root
#     mode: "0644"
#   when: ansible_facts['distribution'] in ["RedHat", "CentOS", "Rocky", "AlmaLinux"]
#   notify: Restart nginx

# ─── Firewall ─────────────────────────────────────────────────────────────────
- name: Allow port {{ nginx_port }} in UFW (Ubuntu)
  ufw:
    rule: allow
    port: "{{ nginx_port }}"
    proto: tcp
  when: ansible_facts['distribution'] == "Ubuntu"

# - name: Allow port {{ nginx_port }} in firewalld (RHEL)
#   firewalld:
#     port: "{{ nginx_port }}/tcp"
#     permanent: true
#     state: enabled
#     immediate: true
#   when: ansible_facts['distribution'] in ["RedHat", "CentOS", "Rocky", "AlmaLinux"]

# ─── Start and enable nginx ───────────────────────────────────────────────────
- name: Ensure nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: true

# ─── Verify ───────────────────────────────────────────────────────────────────
# ─── Verify ───────────────────────────────────────────────────────────────────
- name: Verify nginx responds on port {{ nginx_port }}
  uri:
    url: "http://localhost:{{ nginx_port }}/health"  # Added /health here
    status_code: 200
  register: nginx_check
  retries: 3
  delay: 5
  ignore_errors: true

- name: Show port check result
  debug:
    msg: "Nginx is {{ 'UP' if nginx_check.status == 200 else 'NOT responding' }} on port {{ nginx_port }}"