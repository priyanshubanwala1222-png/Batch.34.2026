# aws_ec2.yml

plugin: amazon.aws.aws_ec2
regions:
  - us-east-1
 
filters:
  instance-state-name: running
  "tag:Role": webserver
 
hostnames:
  - private-ip-address
 
keyed_groups:
  - key: tags.Role
    prefix: role
    separator: "_"
 
compose:
  ansible_host: private_ip_address
  ansible_user: "'ubuntu'"
  ansible_ssh_common_args: "'-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand=\"ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@' ~ lookup('env','BASTION_PUBLIC_IP') ~ '\"'"

